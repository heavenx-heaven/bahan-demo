<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Internet Positive Compliance API Demo</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07111f;
      color: #eaf2ff;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(31, 111, 235, .3), transparent 32rem),
        linear-gradient(135deg, #07111f, #0b1728);
    }
    main {
      width: min(780px, 100%);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0,0,0,.32);
    }
    h1 { margin: 0 0 8px; font-size: 26px; }
    p { color: #aebed6; line-height: 1.6; }
    form { display: grid; gap: 12px; margin: 20px 0; }
    textarea, input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.28);
      color: #fff;
      border-radius: 16px;
      padding: 14px;
      font: inherit;
      outline: none;
    }
    button {
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, #2e80ff, #12b7ff);
    }
    pre {
      overflow: auto;
      background: rgba(0,0,0,.32);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 16px;
      min-height: 120px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Internet Positive Compliance API</h1>
    <p>Demo cek domain. Isi Worker URL kamu, lalu masukkan satu atau beberapa domain.</p>

    <form id="form">
      <input id="api" placeholder="https://YOUR-WORKER.workers.dev" required>
      <textarea id="domains" rows="6" placeholder="example.com&#10;google.com" required></textarea>
      <button type="submit">Cek Domain</button>
    </form>

    <pre id="output">Menunggu input...</pre>
  </main>

  <script>
    const form = document.getElementById("form");
    const output = document.getElementById("output");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const api = document.getElementById("api").value.replace(/\/$/, "");
      const domains = document.getElementById("domains").value
        .split(/\s+/)
        .map((x) => x.trim())
        .filter(Boolean);

      output.textContent = "Loading...";

      try {
        const res = await fetch(`${api}/api/batch`, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ domains })
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = error.message;
      }
    });
  </script>
</body>
</html>
