name = "internet-positive-api"
main = "src/index.js"
compatibility_date = "2026-05-19"
workers_dev = true

[vars]
APP_NAME = "Internet Positive Compliance API"
PUBLIC_CHECK_ENABLED = "true"
CACHE_TTL_SECONDS = "600"
RATE_LIMIT_MAX = "60"
RATE_LIMIT_WINDOW_SECONDS = "60"
PROVIDER_MODE = "generic"
PROVIDER_METHOD = "POST"
PROVIDER_URL = "https://trustpositif.id/api/v1/check"
ALLOWED_ORIGINS = "*"

[triggers]
crons = ["*/10 * * * *"]

[[kv_namespaces]]
binding = "IPOS_CACHE"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "IPOS_RATE_LIMIT"
id = "REPLACE_WITH_RATE_LIMIT_KV_NAMESPACE_ID"

[[kv_namespaces]]
binding = "IPOS_MONITOR"
id = "REPLACE_WITH_MONITOR_KV_NAMESPACE_ID"
